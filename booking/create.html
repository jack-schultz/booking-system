<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Booking System</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
<div class="navbar">
    <div class="nav-left">
        <a href="../index.html">Home</a>
        <a href="manager.html">Bookings</a>
    </div>
    <div class="nav-right">
        <a href="https://github.com/jack-schultz/booking-system">GitHub</a>
    </div>
</div>

<div class="main">
    <div class="booking-wrapper">
        <div class="main-content-card">
            <h1>New Booking</h1>
            <form class="form">
                <!-- Date -->
                <label for="bookingDate">Date</label>
                <input type="date" id="bookingDate" name="bookingDate">

                <!-- Timeslot -->
                <label for="timeslot">Timeslot</label>
                <select id="timeslot" name="timeslot" required>
                    <option value=null>Select Timeslot</option>
                    <option value=1800>6pm</option>
                    <option value=1815>6:15pm</option>
                    <option value=1830>6:30pm</option>
                    <option value=1845>6:45pm</option>
                    <option value=1900>7:00pm</option>
                </select>

                <!-- First Name -->
                <label for="firstName">First Name</label>
                <input type="text" id="firstName" name="firstName" placeholder="John" required>

                <!-- First Name -->
                <label for="lastName">First Name</label>
                <input type="text" id="lastName" name="lastName" placeholder="Smith" required>

                <!-- Phone Number -->
                <label for="phoneNumber">Phone Number</label>
                <input type="text" id="phoneNumber" name="phoneNumber" placeholder="04XXXXXXXX" inputmode="numeric" pattern="[0-9]*" required>

                <!-- Total Pax -->
                <label for="totalPax">Total Pax</label>
                <select id="totalPax" name="totalPax" required>
                    <option value=1>1</option>
                    <option value=2>2</option>
                    <option value=3>3</option>
                    <option value=4>4</option>
                    <option value=5>5</option>
                    <option value=6>6</option>
                    <option value=7>7</option>
                    <option value=8>8</option>
                    <option value=9>9</option>
                    <option value=10>10</option>
                    <option value=11>11</option>
                    <option value=12>12</option>
                    <option value=13>13</option>
                    <option value=14>14</option>
                    <option value=15>15</option>
                </select>

                <!-- Adult Pax -->
                <label for="adultPax">Adults</label>
                <select id="adultPax" name="adultPax" required>
                    <option value=1>1</option>
                    <option value=2>2</option>
                    <option value=3>3</option>
                    <option value=4>4</option>
                    <option value=5>5</option>
                    <option value=6>6</option>
                    <option value=7>7</option>
                    <option value=8>8</option>
                    <option value=9>9</option>
                    <option value=10>10</option>
                    <option value=11>11</option>
                    <option value=12>12</option>
                    <option value=13>13</option>
                    <option value=14>14</option>
                    <option value=15>15</option>
                </select>

                <!-- Child Pax -->
                <label for="childPax">Children</label>
                <select id="childPax" name="childPax" required>
                    <option value=0>None</option>
                    <option value=2>2</option>
                    <option value=3>3</option>
                    <option value=4>4</option>
                    <option value=5>5</option>
                    <option value=6>6</option>
                    <option value=7>7</option>
                    <option value=8>8</option>
                    <option value=9>9</option>
                    <option value=10>10</option>
                    <option value=11>11</option>
                    <option value=12>12</option>
                    <option value=13>13</option>
                    <option value=14>14</option>
                    <option value=15>15</option>
                </select>

                <!-- HC Pax -->
                <label for="hcPax">HighChairs Required</label>
                <select id="hcPax" name="hcPax" required>
                    <option value=0>None</option>
                    <option value=1>1</option>
                    <option value=2>2</option>
                    <option value=3>3</option>
                    <option value=4>4</option>
                    <option value=5>5</option>
                    <option value=6>6</option>
                    <option value=7>7</option>
                    <option value=8>8</option>
                    <option value=9>9</option>
                    <option value=10>10</option>
                    <option value=11>11</option>
                    <option value=12>12</option>
                    <option value=13>13</option>
                    <option value=14>14</option>
                    <option value=15>15</option>
                </select>

                <!-- Preference -->
                <label for="preference">Preference</label>
                <select id="preference" name="preference" required>
                    <option value="none">None</option>
                    <option value="booth">Booth</option>
                    <option value="table">Table</option>
                    <option value="window">Window</option>
                </select>

                <!-- Description -->
                <label for="email">Email</label>
                <input type="text" id="email" name="email" placeholder="john.smith@email.com">

                <!-- Submit button -->
                <button type="submit">SAVE BOOKING</button>
            </form>
        </div>

        <div class="sub-content-card">
            <nav class="button-bar">
                <ul class="button-bar">
                    <li><a class="bookings" href="manager.html">BOOKINGS</a></li>
                    <li><a class="new" href="create.html">NEW BOOKING</a></li>
                    <li><a class="walk-in" href="walkin-create.html">WALK-IN</a></li>
                    <li><button type="submit">SAVE BOOKING</button></li>
                </ul>
            </nav>
        </div>
    </div>
</div>
<script>
    window.onload = function() {
        document.getElementById('bookingDate').value = new Date().toISOString().split('T')[0];
    };
</script>

</body>
</html>
