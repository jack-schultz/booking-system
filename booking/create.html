<script>
    const form = document.querySelector(".form");

    const bookingDate = document.getElementById("bookingDate");
    const timeslot = document.getElementById("timeslot");
    const firstName = document.getElementById("firstName");
    const lastName = document.getElementById("lastName");
    const phoneNumber = document.getElementById("phoneNumber");
    const totalPax = document.getElementById("totalPax");
    const adultPax = document.getElementById("adultPax");
    const childPax = document.getElementById("childPax");
    const hcPax = document.getElementById("hcPax");
    const preference = document.getElementById("preference");
    const email = document.getElementById("email");
    const additionalDetails = document.getElementById("additionalDetails");

    // Default date
    window.onload = function() {
        if (!bookingDate.value) {
            bookingDate.value = new Date().toISOString().split('T')[0];
        }
    };

    // Pax sync logic
    function updatePax() {
        const total = parseInt(totalPax.value) || 0;
        const children = parseInt(childPax.value) || 0;
        const hc = parseInt(hcPax.value) || 0;

        let adults = total - children - hc;
        if (adults < 0) adults = 0;

        adultPax.value = adults;
    }

    totalPax.addEventListener("change", updatePax);
    childPax.addEventListener("change", updatePax);
    hcPax.addEventListener("change", updatePax);

    // Form submit → save to localStorage
    form.addEventListener("submit", function(e) {
        e.preventDefault();

        const date = bookingDate.value;
        const key = `bookings-${date}`;

        const booking = {
            id: crypto.randomUUID(),
            date: date,
            timeslot: timeslot.value,
            firstName: firstName.value,
            lastName: lastName.value,
            phoneNumber: phoneNumber.value,
            totalPax: parseInt(totalPax.value),
            adultPax: parseInt(adultPax.value),
            childPax: parseInt(childPax.value),
            hcPax: parseInt(hcPax.value),
            preference: preference.value,
            email: email.value,
            additionalDetails: additionalDetails.value,
            createdAt: new Date().toISOString()
        };

        // Get existing bookings for this date
        let bookings = [];
        const existing = localStorage.getItem(key);

        if (existing) {
            try {
                bookings = JSON.parse(existing);
            } catch {
                bookings = [];
            }
        }

        // Add new booking
        bookings.push(booking);

        // Save back to localStorage
        localStorage.setItem(key, JSON.stringify(bookings));

        // Send back to booking manager
        window.location.href = "manager.html";
    });
</script>
