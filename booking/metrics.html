<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weekly Metrics — Booking System</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
<div id="site-navbar-mount"></div>

<div class="page-content">
    <div class="metrics-page-layout">
        <div class="page-primary-panel metrics-page-panel">
            <div class="metrics-header-group">
                <button type="button" class="metrics-week-left" id="metrics-week-left" aria-label="Previous week">‹</button>
                <h1 id="metrics-header">Loading...</h1>
                <button type="button" class="metrics-week-right" id="metrics-week-right" aria-label="Next week">›</button>
            </div>
            <p id="metrics-notice" class="booking-notice" hidden></p>
            <div id="metrics-table" class="metrics-table-mount">loading...</div>
        </div>
    </div>
</div>

<div id="site-footer-mount"></div>

<script type="module" src="./metrics.js"></script>
</body>
</html>
