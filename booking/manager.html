<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Booking System</title>
    <link rel="stylesheet" href="../style.css">
    <style>

        .button-wrapper {
            display: flex;
        }
        .button-wrapper p {
            margin: 0;
            padding: 0;
        }
        .booking-list {
            display: flex;
            flex-direction: column; /* Items stack vertically */
            row-gap: 20px; /* Vertical space between items */
        }
        .booking-summary {
            font-size: 24px;
        }
    </style>
</head>
<body>
<div class="navbar">
    <div class="nav-left">
        <a href="../login.html">Login</a>
        <a href="../index.html">Home</a>
        <a href="manager.html">Bookings</a>
    </div>
    <div class="nav-right">
        <a id="logoutBtn">Logout</a>
        <a href="https://github.com/jack-schultz/booking-system">GitHub</a>
    </div>
</div>

<div class="main">
    <div class="booking-wrapper">
        <div class="primary-content-card">
            <h1>Booking Manager</h1>
            <div class="booking-list" id="booking-list"></div>
        </div>

        <div class="secondary-content-card">
            <nav class="button-bar">
                <ul class="button-bar">
                    <li><a class="bookings" href="manager.html">BOOKINGS</a></li>
                    <li><a class="new" href="create.html">NEW BOOKING</a></li>
                    <li><a class="walk-in" href="walkin-create.html">WALK-IN</a></li>
                </ul>
            </nav>
        </div>
    </div>
</div>
</body>

<script>
    const bookingList = document.getElementById("booking-list");

    function getTodayKey() {
        const today = new Date().toISOString().split('T')[0];
        return `bookings-${today}`;
    }

    function loadBookings() {
        const key = getTodayKey();
        const data = localStorage.getItem(key);

        if (!data) {
            bookingList.innerHTML = "<p>No bookings for today</p>";
            return;
        }

        let bookings = [];
        try {
            bookings = JSON.parse(data);
        } catch {
            bookingList.innerHTML = "<p>Error loading bookings</p>";
            return;
        }

        if (bookings.length === 0) {
            bookingList.innerHTML = "<p>No bookings for today</p>";
            return;
        }

        bookingList.innerHTML = "";

        bookings.forEach((booking, index) => {
            const div = document.createElement("div");
            div.className = "content-card";

            div.innerHTML = `
                <div class="booking-summary" style="cursor:pointer;">
                    ${booking.firstName} ${booking.lastName} |
                    ${formatTime(booking.timeslot)} |
                    ${booking.totalPax} (${booking.adultPax}, ${booking.childPax}, ${booking.hcPax})
                </div>

                <div class="booking-details" style="display:none; margin-top:10px;">
                    <p><strong>Total Pax:</strong> ${booking.totalPax}</p>
                    <p><strong>Adult Pax:</strong> ${booking.adultPax}</p>
                    <p><strong>Child Pax:</strong> ${booking.childPax}</p>
                    <p><strong>HC Pax:</strong> ${booking.hcPax}</p>
                    <p><strong>Phone:</strong> ${booking.phoneNumber}</p>
                    <p><strong>Email:</strong> ${booking.email || "-"}</p>
                    <p><strong>Preference:</strong> ${booking.preference}</p>
                    <p><strong>Notes:</strong> ${booking.additionalDetails || "-"}</p>

                    <div class="button-wrapper">
                        <button class="edit-button" data-id="${booking.id}">Edit</button>
                        <button class="delete-button" data-id="${booking.id}">Delete</button>
                    </div>
                </div>
            `;

            // Toggle details
            div.querySelector(".booking-summary").addEventListener("click", () => {
                const details = div.querySelector(".booking-details");
                details.style.display = details.style.display === "none" ? "block" : "none";
            });

            // Delete
            div.querySelector(".delete-button").addEventListener("click", (event) => {
                event.stopPropagation();

                let confirmBox = confirm("Are you sure you want to delete this task?");
                if (confirmBox) {
                    bookings.splice(index, 1);
                    localStorage.setItem(key, JSON.stringify(bookings));
                    div.remove();
                }
            });

            // Edit
            div.querySelector(".edit-button").addEventListener("click", (event) => {
                event.stopPropagation();

                const id = event.target.getAttribute("data-id");

                // send user to create page with edit query string
                window.location.href = `create.html?edit=${id}`;
            });

            bookingList.appendChild(div);
        });
    }

    function formatTime(time) {
        if (!time) return "";
        const str = time.toString().padStart(4, '0');
        let hours = parseInt(str.slice(0, 2));
        const minutes = str.slice(2);

        const ampm = hours >= 12 ? "pm" : "am";
        if (hours > 12) hours -= 12;
        if (hours === 0) hours = 12;

        return `${hours}:${minutes} ${ampm}`;
    }

    window.onload = loadBookings;
</script>
