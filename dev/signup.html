<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Signup</title>
  <script type="module" crossorigin src="/booking-system/dev/assets/signup-BO4fd2nM.js"></script>
  <link rel="modulepreload" crossorigin href="/booking-system/dev/assets/style-D84SsKEL.js">
  <link rel="modulepreload" crossorigin href="/booking-system/dev/assets/navbar-8TJY0WqY.js">
  <link rel="stylesheet" crossorigin href="/booking-system/dev/assets/style-D1zjvZDb.css">
</head>
<body>
<div id="site-navbar-mount"></div>

<h1>Sign Up</h1>

<form id="signupForm" class="auth-form">
    <label for="firstName">First Name</label>
    <input type="text" id="firstName" autocomplete="given-name" required>

    <label for="lastName">Last Name</label>
    <input type="text" id="lastName" autocomplete="family-name" required>

    <label for="email">Email</label>
    <input type="email" id="email" autocomplete="email" required>

    <label for="password">Password</label>
    <input type="password" id="password" required minlength="6">

    <button type="submit">Create Account</button>
</form>

<p id="message" class="auth-message"></p>
<p>Already have an account? <a href="login.html">Log in</a></p>

</body>
</html>
