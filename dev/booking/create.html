<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Booking System</title>
  <script type="module" crossorigin src="/booking-system/dev/assets/create-D-AmyLi5.js"></script>
  <link rel="modulepreload" crossorigin href="/booking-system/dev/assets/style-D84SsKEL.js">
  <link rel="modulepreload" crossorigin href="/booking-system/dev/assets/constants-CItcl7GZ.js">
  <link rel="modulepreload" crossorigin href="/booking-system/dev/assets/navbar-BB3hmdxA.js">
  <link rel="modulepreload" crossorigin href="/booking-system/dev/assets/preload-helper-j_ZwnIYB.js">
  <link rel="modulepreload" crossorigin href="/booking-system/dev/assets/bookings-Bnj5RKnt.js">
  <link rel="modulepreload" crossorigin href="/booking-system/dev/assets/bookingSidebar-DRkGenzl.js">
  <link rel="stylesheet" crossorigin href="/booking-system/dev/assets/style-D1zjvZDb.css">
</head>
<body>
<div id="site-navbar-mount"></div>

<div class="page-content">
    <div class="booking-page-layout">
        <div class="page-primary-panel">
            <h1 id="pageTitle">New Booking</h1>
            <form id="bookingForm" class="booking-form">
                <div class="booking-form-row">
                    <div class="booking-form-column">
                        <label for="bookingDate">Date</label>
                        <input type="date" id="bookingDate" name="bookingDate">
                    </div>

                    <div class="booking-form-column">
                        <label for="timeslot">Timeslot</label>
                        <select id="timeslot" name="timeslot" required>
                            <option value="" disabled selected>Select Timeslot</option>
                        </select>
                    </div>
                </div>

                <div class="booking-form-row">
                    <div class="booking-form-column">
                        <label for="firstName">First Name</label>
                        <input type="text" id="firstName" name="firstName" placeholder="John" required>
                    </div>

                    <div class="booking-form-column">
                        <label for="lastName">Last Name</label>
                        <input type="text" id="lastName" name="lastName" placeholder="Smith" required>
                    </div>
                </div>

                <div class="booking-form-row">
                    <div class="booking-form-column">
                        <label for="phoneNumber">Phone Number</label>
                        <input type="text" id="phoneNumber" name="phoneNumber" placeholder="04XXXXXXXX" inputmode="numeric" pattern="[0-9]*" required>
                    </div>

                    <div class="booking-form-column">
                        <label for="email">Email</label>
                        <input type="text" id="email" name="email" placeholder="john.smith@email.com">
                    </div>
                </div>

                <div class="booking-form-row">
                    <div class="booking-form-column">
                        <label for="totalPax">Total Pax</label>
                        <select id="totalPax" name="totalPax" required>
                            <option value=0 disabled selected>Select Pax</option>
                            <option value=1>1</option>
                            <option value=2>2</option>
                            <option value=3>3</option>
                            <option value=4>4</option>
                            <option value=5>5</option>
                            <option value=6>6</option>
                            <option value=7>7</option>
                            <option value=8>8</option>
                            <option value=9>9</option>
                            <option value=10>10</option>
                            <option value=11>11</option>
                            <option value=12>12</option>
                            <option value=13>13</option>
                            <option value=14>14</option>
                            <option value=15>15</option>
                        </select>
                    </div>

                    <div class="booking-form-column">
                        <label for="adultPax">Adults</label>
                        <select id="adultPax" name="adultPax" required>
                            <option value=0>0</option>
                            <option value=1>1</option>
                            <option value=2>2</option>
                            <option value=3>3</option>
                            <option value=4>4</option>
                            <option value=5>5</option>
                            <option value=6>6</option>
                            <option value=7>7</option>
                            <option value=8>8</option>
                            <option value=9>9</option>
                            <option value=10>10</option>
                            <option value=11>11</option>
                            <option value=12>12</option>
                            <option value=13>13</option>
                            <option value=14>14</option>
                            <option value=15>15</option>
                        </select>
                    </div>

                    <div class="booking-form-column">
                        <label for="childPax">Children</label>
                        <select id="childPax" name="childPax" required>
                            <option value=0>None</option>
                            <option value=1>1</option>
                            <option value=2>2</option>
                            <option value=3>3</option>
                            <option value=4>4</option>
                            <option value=5>5</option>
                            <option value=6>6</option>
                            <option value=7>7</option>
                            <option value=8>8</option>
                            <option value=9>9</option>
                            <option value=10>10</option>
                            <option value=11>11</option>
                            <option value=12>12</option>
                            <option value=13>13</option>
                            <option value=14>14</option>
                            <option value=15>15</option>
                        </select>
                    </div>

                    <div class="booking-form-column">
                        <label for="hcPax">HighChairs Required</label>
                        <select id="hcPax" name="hcPax" required>
                            <option value=0>None</option>
                            <option value=1>1</option>
                            <option value=2>2</option>
                            <option value=3>3</option>
                            <option value=4>4</option>
                            <option value=5>5</option>
                            <option value=6>6</option>
                            <option value=7>7</option>
                            <option value=8>8</option>
                            <option value=9>9</option>
                            <option value=10>10</option>
                            <option value=11>11</option>
                            <option value=12>12</option>
                            <option value=13>13</option>
                            <option value=14>14</option>
                            <option value=15>15</option>
                        </select>
                    </div>
                </div>

                <div class="booking-form-row">
                    <div class="booking-form-column">
                        <label for="preference">Preference</label>
                        <select id="preference" name="preference" required>
                            <option value="none">None</option>
                            <option value="booth">Booth</option>
                            <option value="table">Table</option>
                            <option value="window">Window</option>
                        </select>
                    </div>

                    <div class="booking-form-column">
                        <label for="additionalDetails">Any Additional Notes</label>
                        <textarea id="additionalDetails" name="additionalDetails" placeholder="" rows="2"></textarea>
                    </div>
                </div>

                <button type="submit">SAVE BOOKING</button>
            </form>
        </div>

        <div class="page-sidebar-panel">
            <div id="booking-sidebar-mount"></div>
        </div>
    </div>
</div>

</body>
</html>
