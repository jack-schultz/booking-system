<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Booking System</title>
    <link rel="stylesheet" href="../style.css">
    <style>

        .button-wrapper {
            display: flex;
        }
        .button-wrapper p {
            margin: 0;
            padding: 0;
        }
        .booking-list {
            display: flex;
            flex-direction: column; /* Items stack vertically */
            row-gap: 20px; /* Vertical space between items */
        }
        .booking-summary {
            font-size: 24px;
        }
    </style>
</head>
<body>
<div class="navbar">
    <div class="nav-left">
        <a href="../login.html">Login</a>
        <a href="../index.html">Home</a>
        <a href="manager.html">Bookings</a>
    </div>
    <div class="nav-right">
        <a id="logged_in_user">Not Logged In</a>
        <a id="logoutBtn">Logout</a>
        <a href="https://github.com/jack-schultz/booking-system">GitHub</a>
    </div>
</div>

<div class="main">
    <div class="booking-wrapper">
        <div class="primary-content-card">
            <h1>Booking Manager</h1>
            <div class="booking-list" id="booking-list"></div>
        </div>

        <div class="secondary-content-card">
            <nav class="button-bar">
                <a class="bookings" href="manager.html">BOOKINGS</a>
                <a class="new" href="create.html">NEW BOOKING</a>
                <a class="walk-in" href="walkin-create.html">WALK-IN</a>
            </nav>
        </div>
    </div>
</div>
</body>

<script type="module">
    import { supabase } from "../supabaseClient.js";
    import { initDatabase } from "../db/index.js";
    import {
        deleteBooking,
        formatTimeslot,
        getBookingsForDate,
        getTimeslotFromDatetime,
    } from "../db/bookings.js";

    const bookingList = document.getElementById("booking-list");
    const db = await initDatabase();

    function getTodayDate() {
        return new Date().toISOString().split("T")[0];
    }

    async function loadBookings() {
        const bookings = await getBookingsForDate(db, getTodayDate());

        if (bookings.length === 0) {
            bookingList.innerHTML = "<p>No bookings for today</p>";
            return;
        }

        bookingList.innerHTML = "";

        bookings.forEach((booking) => {
            const timeslot = getTimeslotFromDatetime(booking.datetime);

            if (!document.getElementById(timeslot)) {
                const timeslotDiv = document.createElement("div");
                timeslotDiv.textContent = formatTimeslot(booking.datetime);
                timeslotDiv.id = timeslot;
                timeslotDiv.className = "timeslot-display";
                bookingList.appendChild(timeslotDiv);
            }

            const bookingDiv = document.createElement("div");
            bookingDiv.className = "content-card";
            bookingDiv.innerHTML = `
                <div class="booking-summary" style="cursor:pointer;">
                    <strong>${booking.first_name} ${booking.last_name}</strong> for
                    <strong>${booking.total_pax}</strong> PAX (${booking.adult_pax}, ${booking.child_pax}, ${booking.hc_pax})
                    Preference: <strong>${booking.preference}</strong>
                </div>

                <div class="booking-details" style="display:none; margin-top:10px;">
                    <p><strong>Total Pax</strong>: <strong>${booking.total_pax}</strong> (<strong>${booking.adult_pax}</strong> Adults, <strong>${booking.child_pax}</strong> Children, <strong>${booking.hc_pax}</strong> HC)</p>
                    <p><strong>Time</strong>: ${formatTimeslot(booking.datetime)}</p>
                    <p><strong>Phone</strong>: ${booking.phone_number ?? "-"}</p>
                    <p><strong>Email</strong>: ${booking.email || "-"}</p>
                    <p><strong>Preference</strong>: ${booking.preference}</p>
                    <p><strong>Notes</strong>: ${booking.notes || "-"}</p>

                    <div class="button-wrapper">
                        <button class="edit-button" data-id="${booking.id}">Edit</button>
                        <button class="delete-button" data-id="${booking.id}">Delete</button>
                    </div>
                </div>
            `;

            bookingDiv.querySelector(".booking-summary").addEventListener("click", () => {
                const details = bookingDiv.querySelector(".booking-details");
                details.style.display = details.style.display === "none" ? "block" : "none";
            });

            bookingDiv.querySelector(".delete-button").addEventListener("click", async (event) => {
                event.stopPropagation();
                if (confirm("Are you sure you want to delete this booking?")) {
                    await deleteBooking(db, booking.id);
                    await loadBookings();
                }
            });

            bookingDiv.querySelector(".edit-button").addEventListener("click", (event) => {
                event.stopPropagation();
                const id = event.target.getAttribute("data-id");
                window.location.href = `create.html?edit=${id}`;
            });

            bookingList.appendChild(bookingDiv);
        });
    }

    document.getElementById("logoutBtn").addEventListener("click", async () => {
        await supabase.auth.signOut();
        window.location.href = "../login.html";
    });

    async function login() {
        const { data: { user } } = await supabase.auth.getUser();
        if (!user) {
            window.location.href = "../login.html";
            return;
        }
        document.getElementById("logged_in_user").innerHTML = user.email
        await loadBookings();
    }
    login();
</script>
</html>
