<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Booking System</title>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            var path = location.pathname;
            var showManager = path.endsWith('manager.html') || (!path.endsWith('create.html') && !path.endsWith('walkin.html'));
            var showCreate = path.endsWith('create.html');
            var showWalkin = path.endsWith('walkin.html');
            var vm = document.getElementById('view-manager');
            var vc = document.getElementById('view-create');
            var vw = document.getElementById('view-walkin');
            if (vm) vm.hidden = !showManager;
            if (vc) vc.hidden = !showCreate;
            if (vw) vw.hidden = !showWalkin;
        });
    </script>
  <script type="module" crossorigin src="/booking-system/dev/assets/style-BJcfAIxS.js"></script>
  <script type="module" crossorigin src="/booking-system/dev/assets/preload-helper-j_ZwnIYB.js"></script>
  <script type="module" crossorigin src="/booking-system/dev/assets/register-CxERNST-.js"></script>
  <script type="module" crossorigin src="/booking-system/dev/assets/syncStatus-B8c62kbC.js"></script>
  <script type="module" crossorigin src="/booking-system/dev/assets/supabaseClient-Cll7b3zd.js"></script>
  <script type="module" crossorigin src="/booking-system/dev/assets/accountSwitcher-CsnH6aBP.js"></script>
  <script type="module" crossorigin src="/booking-system/dev/assets/footer-BFG4yJVO.js"></script>
  <script type="module" crossorigin src="/booking-system/dev/assets/sync-DF-SSIE-.js"></script>
  <script type="module" crossorigin src="/booking-system/dev/assets/db-MGT5tZiC.js"></script>
  <script type="module" crossorigin src="/booking-system/dev/assets/bookings-C9sWLIIf.js"></script>
  <script type="module" crossorigin src="/booking-system/dev/assets/paxSummary-Bwfxgj0V.js"></script>
  <script type="module" crossorigin src="/booking-system/dev/assets/tables-CIAHC4n5.js"></script>
  <script type="module" crossorigin src="/booking-system/dev/assets/app-CTP7NcVD.js"></script>
  <link rel="stylesheet" crossorigin href="/booking-system/dev/assets/style-BXjmB7nn.css">
<link rel="manifest" href="/booking-system/dev/manifest.webmanifest"></head>
<body>
<div id="site-navbar-mount"></div>

<div class="page-content">
    <div class="booking-page-layout">
        <div class="page-primary-panel">
            <div id="view-manager">
                <div class="booking-header-group">
                    <button type="button" class="booking-list-date-left" id="booking-list-date-left" aria-label="Previous day">‹</button>
                    <div class="booking-date-picker-wrap">
                        <div class="booking-day-header-panel booking-timeslot-group" id="booking-date-picker" role="button" tabindex="0" aria-haspopup="listbox" aria-expanded="false">
                            <div class="booking-timeslot-heading booking-day-header-heading">
                                <div class="booking-header-title">
                                    <h1 id="booking-list-header">Loading...</h1>
                                    <div id="booking-header-pax" class="booking-header-pax" hidden></div>
                                </div>
                            </div>
                        </div>
                        <div id="booking-date-dropdown" class="booking-date-dropdown" hidden>
                            <div id="booking-date-dropdown-list" class="booking-date-dropdown-list" role="listbox"></div>
                        </div>
                    </div>
                    <button type="button" class="booking-date-today" id="booking-date-today">Today</button>
                    <button type="button" class="booking-list-date-right" id="booking-list-date-right" aria-label="Next day">›</button>
                </div>
                <p id="booking-notice" class="booking-notice" hidden></p>
                <div class="booking-manager-list" id="booking-list">loading...</div>
            </div>

            <div id="view-create" hidden>
                <h1 id="pageTitle">New Booking</h1>
                <p id="create-booking-notice" class="booking-notice" hidden></p>
                <form id="bookingForm" class="booking-form">
                    <div class="booking-form-row">
                        <div class="booking-form-column">
                            <label for="bookingDate">Date</label>
                            <input type="date" id="bookingDate" name="bookingDate">
                        </div>
                        <div class="booking-form-column">
                            <label for="timeslot">Timeslot</label>
                            <select id="timeslot" name="timeslot" required>
                                <option value="" disabled selected>Select Timeslot</option>
                            </select>
                        </div>
                    </div>
                    <div class="booking-form-row">
                        <div class="booking-form-column">
                            <label for="firstName">First Name</label>
                            <input type="text" id="firstName" name="firstName" placeholder="John" required>
                        </div>
                        <div class="booking-form-column">
                            <label for="lastName">Last Name</label>
                            <input type="text" id="lastName" name="lastName" placeholder="Smith">
                        </div>
                    </div>
                    <div class="booking-form-row">
                        <div class="booking-form-column">
                            <label for="phoneNumber">Phone Number</label>
                            <input type="text" id="phoneNumber" name="phoneNumber" placeholder="04XXXXXXXX" inputmode="numeric" pattern="[0-9]*" required>
                        </div>
                        <div class="booking-form-column">
                            <label for="email">Email</label>
                            <input type="text" id="email" name="email" placeholder="john.smith@email.com">
                        </div>
                    </div>
                    <div class="booking-form-row">
                        <div class="booking-form-column">
                            <label for="totalPax">Total Pax</label>
                            <select id="totalPax" name="totalPax" required>
                                <option value="" disabled selected>Select Pax</option>
                                <option value=1>1</option>
                                <option value=2>2</option>
                                <option value=3>3</option>
                                <option value=4>4</option>
                                <option value=5>5</option>
                                <option value=6>6</option>
                                <option value=7>7</option>
                                <option value=8>8</option>
                                <option value=9>9</option>
                                <option value=10>10</option>
                                <option value=11>11</option>
                                <option value=12>12</option>
                                <option value=13>13</option>
                                <option value=14>14</option>
                                <option value=15>15</option>
                            </select>
                        </div>
                        <div class="booking-form-column">
                            <label for="adultPax">Adults</label>
                            <select id="adultPax" name="adultPax" required>
                                <option value=0>0</option>
                                <option value=1>1</option>
                                <option value=2>2</option>
                                <option value=3>3</option>
                                <option value=4>4</option>
                                <option value=5>5</option>
                                <option value=6>6</option>
                                <option value=7>7</option>
                                <option value=8>8</option>
                                <option value=9>9</option>
                                <option value=10>10</option>
                                <option value=11>11</option>
                                <option value=12>12</option>
                                <option value=13>13</option>
                                <option value=14>14</option>
                                <option value=15>15</option>
                            </select>
                        </div>
                        <div class="booking-form-column">
                            <label for="childPax">Children</label>
                            <select id="childPax" name="childPax" required>
                                <option value=0>None</option>
                                <option value=1>1</option>
                                <option value=2>2</option>
                                <option value=3>3</option>
                                <option value=4>4</option>
                                <option value=5>5</option>
                                <option value=6>6</option>
                                <option value=7>7</option>
                                <option value=8>8</option>
                                <option value=9>9</option>
                                <option value=10>10</option>
                                <option value=11>11</option>
                                <option value=12>12</option>
                                <option value=13>13</option>
                                <option value=14>14</option>
                                <option value=15>15</option>
                            </select>
                        </div>
                        <div class="booking-form-column">
                            <label for="hcPax">HighChairs Required</label>
                            <select id="hcPax" name="hcPax" required>
                                <option value=0>None</option>
                                <option value=1>1</option>
                                <option value=2>2</option>
                                <option value=3>3</option>
                                <option value=4>4</option>
                                <option value=5>5</option>
                                <option value=6>6</option>
                                <option value=7>7</option>
                                <option value=8>8</option>
                                <option value=9>9</option>
                                <option value=10>10</option>
                                <option value=11>11</option>
                                <option value=12>12</option>
                                <option value=13>13</option>
                                <option value=14>14</option>
                                <option value=15>15</option>
                            </select>
                        </div>
                    </div>
                    <div class="booking-form-row">
                        <div class="booking-form-column">
                            <label for="preference">Preference</label>
                            <select id="preference" name="preference" required>
                                <option value="none">None</option>
                                <option value="booth">Booth</option>
                                <option value="table">Table</option>
                                <option value="window">Window</option>
                            </select>
                        </div>
                        <div class="booking-form-column">
                            <label for="tableId">Table</label>
                            <select id="tableId" name="tableId">
                                <option value="" selected>None</option>
                            </select>
                        </div>
                        <div class="booking-form-column">
                            <label for="additionalDetails">Any Additional Notes</label>
                            <textarea id="additionalDetails" name="additionalDetails" placeholder="" rows="2"></textarea>
                        </div>
                    </div>
                    <button type="submit">SAVE BOOKING</button>
                </form>
            </div>

            <div id="view-walkin" hidden>
                <h1>Log Walk-In</h1>
                <p>Walk-in booking flow coming soon.</p>
            </div>
        </div>

        <div class="page-sidebar-panel">
            <div id="booking-sidebar-mount"></div>
        </div>
    </div>
</div>

<div id="site-footer-mount"></div>

</body>
</html>
