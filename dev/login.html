<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="navbar">
    <div class="nav-left">
        <a href="login.html">Login</a>
        <a href="index.html">Home</a>
        <a href="booking/manager.html">Bookings</a>
    </div>
    <div class="nav-right">
        <a href="https://github.com/jack-schultz/booking-system">GitHub</a>
    </div>
</div>

<h1>Login</h1>

<form id="loginForm">
    <label for="email">Email</label>
    <input
            type="email"
            id="email"
            placeholder="Email"
            required
    >

    <label for="password">Password</label>
    <input
            type="password"
            id="password"
            placeholder="Password"
            required
    >

    <button type="submit">Login</button>
</form>

<p id="error"></p>

</body>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    const client = window.supabase.createClient(
        "https://qknvowhqqsdtyogkgbsb.supabase.co",
        "sb_publishable_EfcdZ0SGBth4VNdPzBorpA_jVybXP1I"
    );

    const form = document.getElementById("loginForm");

    form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;

        const { error } = await client.auth.signInWithPassword({
            email,
            password
        });

        if (error) {
            document.getElementById("error").textContent =
                error.message;
            return;
        }

        window.location.href = "booking/manager.html";
    });
</script>

</html>
