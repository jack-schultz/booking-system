name: Deploy GitHub Pages

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Configure git
        run: git config --global --add safe.directory '*'

      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          path: main
          fetch-depth: 0

      - name: Checkout dev
        uses: actions/checkout@v4
        with:
          ref: dev
          path: dev
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: main/package-lock.json

      - name: Check Supabase repository secrets
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$VITE_SUPABASE_URL" ] || [ -z "$VITE_SUPABASE_ANON_KEY" ]; then
            echo "::warning::Repository secrets VITE_SUPABASE_URL and/or VITE_SUPABASE_ANON_KEY are missing or empty."
            echo "Add them under Settings → Secrets and variables → Actions → Repository secrets (not Environment secrets)."
            echo "The build will fall back to default values in supabaseClient.js."
          fi

      - name: Build main
        working-directory: main
        env:
          VITE_BASE_PATH: /booking-system/
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          npm ci
          npm run build

      - name: Build dev
        working-directory: dev
        env:
          VITE_BASE_PATH: /booking-system/dev/
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          npm ci
          npm run build

      - name: Prepare site
        run: |
          mkdir public
          cp -r main/dist/* public/
          mkdir -p public/dev
          cp -r dev/dist/* public/dev/

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: public
