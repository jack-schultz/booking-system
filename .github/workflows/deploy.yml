name: Deploy GitHub Pages

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Configure git
        run: git config --global --add safe.directory '*'

      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          path: main
          fetch-depth: 0

      - name: Checkout dev
        uses: actions/checkout@v4
        with:
          ref: dev
          path: dev
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build main
        working-directory: main
        env:
          VITE_BASE_PATH: /booking-system/
        run: |
          if [ ! -f package.json ]; then
            echo "No package.json on main — skipping Vite build"
            exit 0
          fi
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi
          npm run build

      - name: Build dev
        working-directory: dev
        env:
          VITE_BASE_PATH: /booking-system/dev/
        run: |
          if [ ! -f package.json ]; then
            echo "No package.json on dev — skipping Vite build"
            exit 0
          fi
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi
          npm run build

      - name: Prepare site
        run: |
          mkdir -p public public/dev

          if [ -d main/dist ] && [ "$(ls -A main/dist 2>/dev/null)" ]; then
            cp -r main/dist/* public/
          else
            for path in main/*; do
              name="$(basename "$path")"
              [ "$name" = ".github" ] && continue
              cp -r "$path" public/
            done
          fi

          if [ -d dev/dist ] && [ "$(ls -A dev/dist 2>/dev/null)" ]; then
            cp -r dev/dist/* public/dev/
          else
            for path in dev/*; do
              name="$(basename "$path")"
              [ "$name" = ".github" ] && continue
              cp -r "$path" public/dev/
            done
          fi

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: public
