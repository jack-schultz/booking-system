name: Deploy GitHub Pages

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Configure git
        run: git config --global --add safe.directory '*'

      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          path: main
          fetch-depth: 0

      - name: Checkout dev
        uses: actions/checkout@v4
        with:
          ref: dev
          path: dev
          fetch-depth: 0

      - name: Prepare site
        run: |
          mkdir public
          cp -r main/* public/ || true
          mkdir -p public/dev
          cp -r dev/* public/dev/ || true

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: public